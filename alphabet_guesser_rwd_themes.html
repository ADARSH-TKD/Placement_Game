<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystic Sands: Alphabet Guesser</title>
  <meta name="description" content="Embark on an ancient Egyptian journey to guess the secret letters and unlock the pharaoh's mystery.">
  
  <!-- Fonts: Cinzel for Pharaonic titles, Outfit for UI/text -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons: Tabler Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  
  <style>
    :root {
      /* Egyptian Night (Hero Theme) */
      --bg-gradient: radial-gradient(circle at top, #0a0b21 0%, #040510 60%, #010104 100%);
      --card-bg: rgba(10, 11, 28, 0.78);
      --card-border: rgba(212, 175, 55, 0.4);
      --card-glow: 0 12px 40px 0 rgba(0, 0, 0, 0.75), 0 0 20px rgba(212, 175, 55, 0.15);
      --text-main: #F5EFE4;
      --text-muted: #9591A5;
      --gold-accent: #D4AF37;
      --gold-glow: 0 0 10px rgba(212, 175, 55, 0.7);
      --btn-bg: rgba(21, 23, 51, 0.7);
      --btn-border: rgba(212, 175, 55, 0.2);
      --btn-text: #F5EFE4;
      --btn-hover-bg: rgba(212, 175, 55, 0.12);
      --correct-bg: rgba(16, 185, 129, 0.25);
      --correct-border: #10B981;
      --correct-glow: 0 0 15px rgba(16, 185, 129, 0.5);
      --wrong-bg: rgba(239, 68, 68, 0.25);
      --wrong-border: #EF4444;
      --wrong-glow: 0 0 15px rgba(239, 68, 68, 0.5);
      --particle-color: rgba(212, 175, 55, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #020206;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      color: var(--text-main);
      transition: background-color 0.5s;
    }

    /* Fixed Canvas for sand/star particles */
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .app {
      min-height: 100vh;
      padding: 2.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      z-index: 1;
    }

    /* Themes override CSS variables */
    .app.egyptian-night {
      /* Handled by root defaults */
    }

    .app.golden-desert {
      --bg-gradient: linear-gradient(135deg, #1d0f02 0%, #4a2404 40%, #875114 80%, #b87e2a 100%);
      --card-bg: rgba(38, 19, 3, 0.8);
      --card-border: rgba(230, 161, 60, 0.38);
      --card-glow: 0 12px 40px 0 rgba(0, 0, 0, 0.7), 0 0 20px rgba(230, 161, 60, 0.15);
      --text-main: #FFF3E0;
      --text-muted: #CBB9A7;
      --gold-accent: #FFB300;
      --gold-glow: 0 0 10px rgba(255, 179, 0, 0.7);
      --btn-bg: rgba(77, 39, 5, 0.6);
      --btn-border: rgba(255, 179, 0, 0.22);
      --btn-text: #FFF3E0;
      --btn-hover-bg: rgba(255, 179, 0, 0.15);
      --correct-bg: rgba(74, 222, 128, 0.25);
      --correct-border: #4ADE80;
      --correct-glow: 0 0 15px rgba(74, 222, 128, 0.5);
      --wrong-bg: rgba(248, 113, 113, 0.25);
      --wrong-border: #F87171;
      --wrong-glow: 0 0 15px rgba(248, 113, 113, 0.5);
      --particle-color: rgba(255, 179, 0, 0.6);
    }

    .app.oasis-twilight {
      --bg-gradient: radial-gradient(circle at top, #011417 0%, #03252a 50%, #060e14 100%);
      --card-bg: rgba(3, 29, 33, 0.82);
      --card-border: rgba(0, 229, 255, 0.35);
      --card-glow: 0 12px 40px 0 rgba(0, 0, 0, 0.75), 0 0 20px rgba(0, 229, 255, 0.15);
      --text-main: #E0F7FA;
      --text-muted: #7E9FA3;
      --gold-accent: #00E5FF;
      --gold-glow: 0 0 10px rgba(0, 229, 255, 0.7);
      --btn-bg: rgba(2, 35, 43, 0.7);
      --btn-border: rgba(0, 229, 255, 0.18);
      --btn-text: #E0F7FA;
      --btn-hover-bg: rgba(0, 229, 255, 0.12);
      --correct-bg: rgba(38, 166, 154, 0.25);
      --correct-border: #26A69A;
      --correct-glow: 0 0 15px rgba(38, 166, 154, 0.5);
      --wrong-bg: rgba(239, 83, 80, 0.25);
      --wrong-border: #EF5350;
      --wrong-glow: 0 0 15px rgba(239, 83, 80, 0.5);
      --particle-color: rgba(0, 229, 255, 0.45);
    }

    /* Header styling with Egyptian flair */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .ancient-decor {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 0.4rem;
    }

    .decor-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-accent), transparent);
    }

    .decorative-icon {
      color: var(--gold-accent);
      font-size: 1.6rem;
      filter: drop-shadow(var(--gold-glow));
      animation: float 4s ease-in-out infinite;
    }

    .game-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.4rem, 6vw, 3.4rem);
      font-weight: 900;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #FFF5E6 20%, var(--gold-accent) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.2rem;
      filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
    }

    .game-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      letter-spacing: 5px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Control Panel (Themes + Audio Mute) */
    .control-panel {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      z-index: 10;
      animation: fadeIn 1.2s ease-out;
    }

    .theme-bar {
      display: flex;
      background: rgba(0, 0, 0, 0.35);
      padding: 4px;
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .th-btn {
      padding: 8px 16px;
      border-radius: 99px;
      border: none;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .th-btn:hover {
      color: var(--text-main);
    }

    .th-btn.active {
      background: var(--gold-accent);
      color: #120e06;
      box-shadow: 0 2px 10px rgba(212, 175, 55, 0.4);
    }

    .audio-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--gold-accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    }

    .audio-btn:hover {
      background: var(--gold-accent);
      color: #120e06;
      border-color: var(--gold-accent);
      transform: scale(1.08);
    }

    .audio-btn.muted {
      color: var(--text-muted);
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(0,0,0,0.25);
    }

    /* Main Cartouche Card */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 24px;
      padding: 2.2rem;
      box-shadow: var(--card-glow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      transition: all 0.5s ease;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--gold-accent), transparent);
    }

    /* Screen shake for wrong answers */
    .card.shake {
      animation: shake 0.35s ease-in-out;
    }

    /* Game Mode Buttons */
    .mode-row {
      display: flex;
      gap: 12px;
      margin-bottom: 1.8rem;
    }

    .mode-btn {
      flex: 1;
      padding: 12px 6px;
      border-radius: 12px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text-muted);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mode-btn:hover {
      border-color: var(--gold-accent);
      color: var(--text-main);
      transform: translateY(-2px);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, rgba(212,175,55,0.14) 0%, rgba(212,175,55,0.02) 100%);
      border-color: var(--gold-accent);
      color: var(--gold-accent);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
    }

    .badge {
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
    }

    .badge-e {
      background: rgba(16, 185, 129, 0.15);
      color: #34D399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .badge-h {
      background: rgba(239, 68, 68, 0.15);
      color: #F87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Num Box (Mystical Cartouche Orb) */
    .num-box {
      text-align: center;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
    }

    /* Circular SVG Loader Container */
    .cartouche-container {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 0.5rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .countdown-ring {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(212, 175, 55, 0.08);
      stroke-width: 5;
    }

    .ring-fill {
      fill: none;
      stroke: var(--gold-accent);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 339.29; /* 2 * PI * 54 */
      stroke-dashoffset: 339.29; /* Start empty */
      transition: stroke-dashoffset 0.1s linear, stroke 0.3s;
    }

    .num-big {
      font-size: clamp(3.2rem, 10vw, 4.2rem);
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      z-index: 2;
      filter: drop-shadow(var(--gold-glow));
      transition: opacity 0.25s, transform 0.25s;
    }

    .num-sub {
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--text-muted);
      font-family: 'Cinzel', serif;
      text-transform: uppercase;
      margin-top: 0.6rem;
    }

    /* Streak & Progress Bar */
    .streak-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      background: rgba(0,0,0,0.2);
      padding: 10px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
    }

    .streak-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .streak-label i {
      color: #F59E0B;
      text-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
    }

    .streak-track {
      flex: 1;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .streak-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      background: linear-gradient(90deg, var(--gold-accent), #F59E0B);
      box-shadow: var(--gold-glow);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Hints and Banner info */
    .hint {
      font-size: 13.5px;
      text-align: center;
      margin-bottom: 1.5rem;
      min-height: 22px;
      color: var(--gold-accent);
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0.95;
    }

    /* Grid of stone-styled buttons */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .lb {
      aspect-ratio: 1;
      border-radius: 10px;
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      color: var(--text-main);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb:hover:not(:disabled) {
      border-color: var(--gold-accent);
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
      transform: translateY(-3px);
    }

    .lb:active {
      transform: scale(0.92);
    }

    .lb:disabled {
      opacity: 0.22;
      cursor: default;
      box-shadow: none;
      transform: none;
    }

    /* Success / Failure Glowing stone state */
    .lb.correct {
      background: var(--correct-bg) !important;
      border-color: var(--correct-border) !important;
      color: #fff !important;
      box-shadow: var(--correct-glow) !important;
      opacity: 1 !important;
    }

    .lb.wrong {
      background: var(--wrong-bg) !important;
      border-color: var(--wrong-border) !important;
      color: #fff !important;
      box-shadow: var(--wrong-glow) !important;
      opacity: 1 !important;
    }

    /* Interactive dashboard stats panels */
    .result {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      min-height: 22px;
      margin-bottom: 0.6rem;
      letter-spacing: 0.5px;
    }

    .next-banner {
      text-align: center;
      font-size: 13.5px;
      min-height: 18px;
      margin-bottom: 1.2rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.8rem;
    }

    .stat {
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s, border-color 0.3s;
    }

    .stat:hover {
      transform: translateY(-2px);
      border-color: rgba(212, 175, 55, 0.15);
    }

    .sv {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold-accent);
      text-shadow: var(--gold-glow);
    }

    .sl {
      font-size: 10px;
      opacity: 0.65;
      margin-top: 4px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'Cinzel', serif;
    }

    /* Skip / Reset Actions Bar */
    .btn-row {
      display: flex;
      gap: 12px;
    }

    .act-btn {
      flex: 1;
      padding: 12px 0;
      border-radius: 12px;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text-main);
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .act-btn:hover {
      border-color: var(--gold-accent);
      background: var(--btn-hover-bg);
      transform: translateY(-2px);
    }

    .act-btn:active {
      transform: translateY(0) scale(0.97);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    /* Screen shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 45%, 75% { transform: translateX(-6px); }
      30%, 60%, 90% { transform: translateX(6px); }
    }

    /* Animation classes */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(35px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .card {
        padding: 1.25rem;
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
        gap: 6px;
      }
      .lb {
        font-size: 14.5px;
      }
      .cartouche-container {
        width: 110px;
        height: 110px;
      }
      .num-big {
        font-size: 2.8rem;
      }
      .mode-row {
        gap: 8px;
        margin-bottom: 1.2rem;
      }
      .mode-btn {
        padding: 10px 4px;
        font-size: 11.5px;
      }
    }
  </style>
</head>
<body>

  <!-- Background Particle Emitter -->
  <canvas id="particle-canvas"></canvas>

  <div class="app egyptian-night" id="app">
    <h2 class="sr-only">Mystic Sands: Responsive alphabet guessing game with Egyptian Night, Golden Desert, and Oasis Twilight themes</h2>

    <header class="header">
      <div class="ancient-decor">
        <span class="decor-line"></span>
        <i class="ti ti-crown decorative-icon" aria-hidden="true"></i>
        <span class="decor-line"></span>
      </div>
      <h1 class="game-title">MYSTIC SANDS</h1>
      <p class="game-subtitle">The Alphabet Guesser</p>
    </header>

    <div class="control-panel">
      <div class="theme-bar">
        <button class="th-btn active" data-theme="egyptian-night" onclick="setTheme('egyptian-night')">
          <i class="ti ti-moon" aria-hidden="true"></i> Night
        </button>
        <button class="th-btn" data-theme="golden-desert" onclick="setTheme('golden-desert')">
          <i class="ti ti-sun" aria-hidden="true"></i> Desert
        </button>
        <button class="th-btn" data-theme="oasis-twilight" onclick="setTheme('oasis-twilight')">
          <i class="ti ti-droplet" aria-hidden="true"></i> Oasis
        </button>
      </div>
      
      <button class="audio-btn" id="audio-toggle" onclick="toggleAudio()" title="Toggle Sound">
        <i class="ti ti-volume" id="audio-icon" aria-hidden="true"></i>
      </button>
    </div>

    <div class="card">
      <div class="mode-row">
        <button class="mode-btn active" id="btn-easy" onclick="setMode('easy')">
          <span>Easy Mode</span>
          <span class="badge badge-e">1–26</span>
        </button>
        <button class="mode-btn" id="btn-hard" onclick="setMode('hard')">
          <span>Hard Mode</span>
          <span class="badge badge-h">1–52</span>
        </button>
      </div>

      <div class="num-box">
        <div class="cartouche-container">
          <svg class="countdown-ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="54"></circle>
            <circle class="ring-fill" id="countdown-fill" cx="60" cy="60" r="54"></circle>
          </svg>
          <div class="num-big" id="num-display">?</div>
        </div>
        <div class="num-sub" id="num-sub">A=1  B=2  C=3  …  Z=26</div>
      </div>

      <div class="streak-bar">
        <span class="streak-label">
          <i class="ti ti-flame" aria-hidden="true"></i>
          <span id="streak-val">0</span>
        </span>
        <div class="streak-track">
          <div class="streak-fill" id="streak-fill" style="width: 0%;"></div>
        </div>
        <span class="streak-label" id="best-label">Best: 0</span>
      </div>

      <div class="hint" id="hint">Pick the correct letter!</div>
      <div class="grid" id="grid"></div>
      <div class="result" id="result"></div>
      <div class="next-banner" id="next-banner"></div>

      <div class="stats">
        <div class="stat">
          <div class="sv" id="score">0</div>
          <div class="sl">Score</div>
        </div>
        <div class="stat">
          <div class="sv" id="attempts">0</div>
          <div class="sl">Attempts</div>
        </div>
        <div class="stat">
          <div class="sv" id="rounds">0</div>
          <div class="sl">Rounds</div>
        </div>
      </div>

      <div class="btn-row">
        <button class="act-btn" onclick="skipRound()">
          <i class="ti ti-player-skip-forward" aria-hidden="true"></i> Skip
        </button>
        <button class="act-btn" onclick="resetAll()">
          <i class="ti ti-refresh" aria-hidden="true"></i> Reset
        </button>
      </div>
    </div>
  </div>

  <script>
    // Web Audio Synthesizer for rich immersive sound feedback
    class AudioSynth {
      constructor() {
        this.ctx = null;
        this.muted = false;
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }
      playCorrect() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        // Warm synthetic golden chime (Arpeggio notes C5 -> E5 -> G5 -> C6)
        const notes = [523.25, 659.25, 783.99, 1046.50];
        notes.forEach((freq, index) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + index * 0.08);
          
          gain.gain.setValueAtTime(0, now + index * 0.08);
          gain.gain.linearRampToValueAtTime(0.18, now + index * 0.08 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.08 + 0.45);
          
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          
          osc.start(now + index * 0.08);
          osc.stop(now + index * 0.08 + 0.55);
        });
      }
      playWrong() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(140, now);
        osc.frequency.linearRampToValueAtTime(75, now + 0.25);
        
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start(now);
        osc.stop(now + 0.3);
      }
      playReset() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(720, now + 0.35);
        
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.12, now + 0.06);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start(now);
        osc.stop(now + 0.45);
      }
    }
    const synth = new AudioSynth();

    function toggleAudio() {
      synth.muted = !synth.muted;
      const btn = document.getElementById('audio-toggle');
      const icon = document.getElementById('audio-icon');
      if (synth.muted) {
        btn.classList.add('muted');
        icon.className = 'ti ti-volume-off';
      } else {
        btn.classList.remove('muted');
        icon.className = 'ti ti-volume';
        synth.playReset();
      }
    }

    // Interactive canvas particle system representing golden sand dust or stars
    class ParticleSystem {
      constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.particles = [];
        this.color = 'rgba(212, 175, 55, 0.5)';
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.init();
        this.animate();
      }
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      init() {
        this.particles = [];
        const count = Math.min(Math.floor(window.innerWidth / 12), 120);
        for (let i = 0; i < count; i++) {
          this.particles.push({
            x: Math.random() * this.canvas.width,
            y: Math.random() * this.canvas.height,
            size: Math.random() * 2 + 0.5,
            speedX: Math.random() * 0.5 - 0.25,
            speedY: -(Math.random() * 0.7 + 0.15), // drifting upwards
            alpha: Math.random() * 0.5 + 0.1,
            oscSpeed: Math.random() * 0.02 + 0.005,
            oscDistance: Math.random() * 20 + 5,
            oscAngle: Math.random() * Math.PI
          });
        }
      }
      setTheme(t) {
        if (t === 'egyptian-night') {
          this.color = 'rgba(212, 175, 55, 0.55)';
        } else if (t === 'golden-desert') {
          this.color = 'rgba(255, 179, 0, 0.6)';
        } else if (t === 'oasis-twilight') {
          this.color = 'rgba(0, 229, 255, 0.5)';
        }
      }
      triggerBurst(x, y) {
        const count = 35;
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 5 + 2.5;
          this.particles.push({
            x: x,
            y: y,
            size: Math.random() * 2.5 + 1.2,
            speedX: Math.cos(angle) * speed,
            speedY: Math.sin(angle) * speed,
            alpha: 1.0,
            decay: Math.random() * 0.03 + 0.015,
            isSpark: true
          });
        }
      }
      animate() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          
          if (p.isSpark) {
            p.x += p.speedX;
            p.y += p.speedY;
            p.speedY += 0.07; // subtle spark gravity
            p.alpha -= p.decay;
            
            if (p.alpha <= 0) {
              this.particles.splice(i, 1);
              continue;
            }
          } else {
            p.y += p.speedY;
            p.oscAngle += p.oscSpeed;
            
            if (p.y < -10) {
              p.y = this.canvas.height + 10;
              p.x = Math.random() * this.canvas.width;
            }
          }

          const currentX = p.isSpark ? p.x : p.x + Math.sin(p.oscAngle) * p.oscDistance * 0.1;
          
          this.ctx.beginPath();
          this.ctx.arc(currentX, p.y, p.size, 0, Math.PI * 2);
          this.ctx.fillStyle = this.color.replace(/[^,]+(?=\))/, p.alpha);
          this.ctx.shadowBlur = p.isSpark ? p.size * 3 : 0;
          this.ctx.shadowColor = this.color;
          this.ctx.fill();
        }
        
        requestAnimationFrame(() => this.animate());
      }
    }

    // Core Game State and Logic
    const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const EASY = {}, HARD = {};
    LETTERS.forEach((l, i) => {
      EASY[l] = [i + 1, i + 1];
      HARD[l] = [i * 2 + 1, i * 2 + 2];
    });

    let mode = 'easy', ranges = EASY, theme = 'egyptian-night';
    let secret, answer, guessed;
    let score = 0, attempts = 0, rounds = 0, streak = 0, best = 0, autoTimer = null;

    function setTheme(t) {
      theme = t;
      const app = document.getElementById('app');
      app.className = 'app ' + t;
      
      document.querySelectorAll('.theme-bar .th-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-theme') === t);
      });
      
      if (window.particleSystem) {
        window.particleSystem.setTheme(t);
      }
    }

    function setMode(m) {
      mode = m;
      ranges = m === 'easy' ? EASY : HARD;
      document.getElementById('btn-easy').className = 'mode-btn' + (m === 'easy' ? ' active' : '');
      document.getElementById('btn-hard').className = 'mode-btn' + (m === 'hard' ? ' active' : '');
      document.getElementById('num-sub').textContent = m === 'easy' ? 'A=1  B=2  C=3  …  Z=26' : 'A=1–2  B=3–4  …  Z=51–52';
      clearAuto();
      buildGrid();
      newRound();
    }

    function pick() {
      const max = mode === 'easy' ? 26 : 52;
      const n = Math.floor(Math.random() * max) + 1;
      return { n, letter: LETTERS.find(l => n >= ranges[l][0] && n <= ranges[l][1]) };
    }

    function buildGrid() {
      const g = document.getElementById('grid');
      g.innerHTML = '';
      LETTERS.forEach(l => {
        const b = document.createElement('button');
        b.className = 'lb';
        b.id = 'lb-' + l;
        b.textContent = l;
        b.onclick = () => guess(l);
        g.appendChild(b);
      });
    }

    function newRound() {
      clearAuto();
      ({ n: secret, letter: answer } = pick());
      guessed = false;
      rounds++;
      document.getElementById('rounds').textContent = rounds;
      
      const nd = document.getElementById('num-display');
      nd.style.opacity = '0';
      nd.style.transform = 'scale(0.85)';
      
      setTimeout(() => {
        nd.textContent = secret;
        nd.style.opacity = '1';
        nd.style.transform = 'scale(1)';
      }, 160);
      
      // Reset circular timer display
      const ringFill = document.getElementById('countdown-fill');
      if (ringFill) {
        ringFill.style.transition = 'stroke-dashoffset 0.3s ease';
        ringFill.style.strokeDashoffset = '339.29'; // Empty circle
      }
      
      document.getElementById('hint').textContent = 'Pick the correct letter!';
      document.getElementById('result').textContent = '';
      document.getElementById('next-banner').textContent = '';
      LETTERS.forEach(l => {
        const b = document.getElementById('lb-' + l);
        b.className = 'lb';
        b.disabled = false;
      });
    }

    function guess(l) {
      if (guessed) return;
      attempts++;
      document.getElementById('attempts').textContent = attempts;
      const b = document.getElementById('lb-' + l);
      
      // Get click button coordinates for explosion particles
      const rect = b.getBoundingClientRect();
      const clickX = rect.left + rect.width / 2;
      const clickY = rect.top + rect.height / 2;
      
      if (l === answer) {
        guessed = true;
        score++;
        streak++;
        synth.playCorrect();
        
        if (window.particleSystem) {
          window.particleSystem.triggerBurst(clickX, clickY);
        }
        
        if (streak > best) {
          best = streak;
          document.getElementById('best-label').textContent = 'Best: ' + best;
        }
        
        b.className = 'lb correct';
        document.getElementById('score').textContent = score;
        updateStreak();
        
        const [lo, hi] = ranges[answer];
        document.getElementById('result').textContent = 'Correct! ' + secret + (mode === 'easy' ? ' = ' + answer : ' is in ' + answer + ' (' + lo + '–' + hi + ')');
        
        LETTERS.forEach(k => {
          document.getElementById('lb-' + k).disabled = true;
        });
        
        scheduleNext();
      } else {
        b.className = 'lb wrong';
        b.disabled = true;
        streak = 0;
        updateStreak();
        synth.playWrong();
        
        // Add container card shake for tactile incorrect feedback
        const card = document.querySelector('.card');
        card.classList.add('shake');
        card.addEventListener('animationend', () => {
          card.classList.remove('shake');
        }, { once: true });
        
        let msg = '';
        if (mode === 'easy') {
          msg = secret > EASY[l][0] ? l + ' is too early — answer is later' : l + ' is too late — answer is earlier';
        } else {
          msg = secret > HARD[l][1] ? l + '\'s range is below ' + secret + ' — go higher' : l + '\'s range is above ' + secret + ' — go lower';
        }
        document.getElementById('hint').textContent = msg;
      }
    }

    function scheduleNext() {
      let duration = 3000;
      let elapsed = 0;
      let interval = 30;
      const ringFill = document.getElementById('countdown-fill');
      
      if (ringFill) {
        ringFill.style.transition = 'none';
        ringFill.style.strokeDashoffset = '0';
      }
      
      document.getElementById('next-banner').textContent = 'Next in 3…';
      
      autoTimer = setInterval(() => {
        elapsed += interval;
        const remainingSec = Math.ceil((duration - elapsed) / 1000);
        if (remainingSec > 0) {
          document.getElementById('next-banner').textContent = 'Next in ' + remainingSec + '…';
        }
        
        const pct = elapsed / duration;
        if (ringFill) {
          const circumference = 339.29;
          ringFill.style.strokeDashoffset = circumference * pct;
        }
        
        if (elapsed >= duration) {
          clearInterval(autoTimer);
          autoTimer = null;
          if (ringFill) ringFill.style.strokeDashoffset = '0';
          newRound();
        }
      }, interval);
    }

    function clearAuto() {
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
      }
    }

    function updateStreak() {
      document.getElementById('streak-val').textContent = streak;
      const pct = Math.min(streak, 10) / 10 * 100;
      const fill = document.getElementById('streak-fill');
      
      if (fill) {
        fill.style.width = pct + '%';
        if (streak >= 7) {
          fill.style.background = 'linear-gradient(90deg, #10B981, #34D399)';
          fill.style.boxShadow = '0 0 10px rgba(52, 211, 153, 0.8)';
        } else if (streak >= 4) {
          fill.style.background = 'linear-gradient(90deg, #F59E0B, #10B981)';
          fill.style.boxShadow = '0 0 8px rgba(245, 158, 11, 0.6)';
        } else {
          fill.style.background = 'linear-gradient(90deg, var(--gold-accent), #F59E0B)';
          fill.style.boxShadow = '0 0 6px rgba(212, 175, 55, 0.4)';
        }
      }
    }

    function skipRound() {
      streak = 0;
      updateStreak();
      clearAuto();
      synth.playReset();
      newRound();
    }

    function resetAll() {
      score = 0;
      attempts = 0;
      rounds = 0;
      streak = 0;
      best = 0;
      ['score', 'attempts', 'rounds'].forEach(id => {
        document.getElementById(id).textContent = 0;
      });
      document.getElementById('best-label').textContent = 'Best: 0';
      updateStreak();
      clearAuto();
      synth.playReset();
      newRound();
    }

    // Initialization
    buildGrid();
    newRound();
    window.particleSystem = new ParticleSystem('particle-canvas');
    window.particleSystem.setTheme(theme);
  </script>
</body>
</html>
